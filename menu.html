<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body.menu-bg {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
        }

        .menu-overlay {
            padding: 40px;
            text-align: center;
            color: white;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .menu-card {
            background: white;
            color: black;
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .menu-card:hover {
            transform: scale(1.05);
        }

        .menu-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 10px;
        }

        h1 {
            margin-bottom: 10px;
        }
    </style>
</head>

<body class="menu-bg">

    <div class="menu-overlay">

        <!-- ✅ Logout Button -->
        <button onclick="logout()"
            style="position:absolute; top:20px; right:20px; padding:8px 15px; border:none; border-radius:8px; cursor:pointer;">
            Logout
        </button>

        <h1>Customer Shopping Behaviour Analysis</h1>
        <p>Explore Insights & Analytics</p>

        <div class="menu-grid">

            <div class="menu-card" onclick="openPage('dashboard.html')">
                <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=800">
                <h3>Dashboard</h3>
            </div>

            <div class="menu-card" onclick="openPage('customer-insights.html')">
                <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=800">
                <h3>Customer Insights</h3>
            </div>

            <div class="menu-card" onclick="openPage('product.html')">
                <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?q=80&w=800">
                <h3>Product Categories</h3>
            </div>

            <div class="menu-card" onclick="openPage('sales.html')">
                <img src="https://images.unsplash.com/photo-1556155092-490a1ba16284?q=80&w=800">
                <h3>Sales Trends</h3>
            </div>

            <div class="menu-card" onclick="openPage('feedback.html')">
                <img src="https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?q=80&w=800">
                <h3>Feedback</h3>
            </div>

        </div>

    </div>

    <script>
        function openPage(page) {
            window.location.href = page;
        }

        /* ✅ FIX: Logout function add chesanu */
        function logout() {
            localStorage.removeItem("loggedIn");
            alert("Logged out successfully!");
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
