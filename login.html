<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Glass-style login box */
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: url('https://images.unsplash.com/photo-1503264116251-35a269479413?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
            background-size: cover;
        }

        .login {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.5);
            /* increased transparency */
            backdrop-filter: blur(15px);
            /* stronger blur */
            border-radius: 15px;
            padding: 30px;
            width: 350px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            color: #fff;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #6B73FF;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #000DFF;
        }

        .switch,
        .forgot {
            text-align: center;
            margin-top: 10px;
            cursor: pointer;
        }

        .switch span {
            color: #6B73FF;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <section class="login">

        <!-- LOGIN BOX -->
        <div class="login-box" id="loginBox">
            <h2>Login</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <p class="forgot" onclick="forgotPassword()">Forgot Password?</p>
            <button onclick="login()">Login</button>
            <p class="switch">Don't have an account? <span onclick="showSignup()">Sign Up</span></p>
        </div>

        <!-- SIGNUP BOX -->
        <div class="login-box" id="signupBox" style="display:none;">
            <h2>Create Account</h2>
            <input type="text" id="signupName" placeholder="Full Name">
            <input type="email" id="signupEmail" placeholder="Email">
            <input type="password" id="signupPassword" placeholder="Password">
            <button onclick="createAccount()">Create Account</button>
            <p class="switch">Already have an account? <span onclick="showLogin()">Login</span></p>
        </div>

    </section>

    <script>
        /* ===== Show/Hide Boxes ===== */
        function showSignup() {
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("signupBox").style.display = "block";
        }
        function showLogin() {
            document.getElementById("signupBox").style.display = "none";
            document.getElementById("loginBox").style.display = "block";
        }

        /* ===== Backend Login API ===== */
        function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!email || !password) {
                alert('Please enter both email and password.');
                return;
            }

            fetch('http://localhost:3000/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        localStorage.setItem("user_id", data.user_id);
                        alert('Login successful!');
                        window.location.href = 'menu.html';
                    } else {
                        alert(data.message || 'Invalid email or password.');
                    }
                })
                .catch(err => {
                    console.error("Login endpoint failed:", err);
                    alert('Server error: Could not connect to backend. Please ensure node server.js is running!');
                });
        }

        /* ===== Create Account API ===== */
        function createAccount() {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;

            fetch('http://localhost:3000/api/signup', { // API route ready in backend
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        alert('Account Created Successfully!');
                        showLogin();
                    } else {
                        alert(data.message || 'Error creating account');
                    }
                })
                .catch(err => alert('Server error: Ensure node server.js is running!'));
        }

        /* ===== Forgot Password API ===== */
        function forgotPassword() {
            const email = prompt("Enter your email for reset link:");
            if (email) {
                fetch('http://localhost:3000/api/forgot-password', { // URL must match backend
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                })
                    .then(res => res.json())
                    .then(data => alert(data.message))
                    .catch(err => alert('Server error: Ensure node server.js is running!'));
            }
        }
    </script>

</body>

</html>
